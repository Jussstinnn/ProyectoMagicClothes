<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magic Clothes — Contáctenos</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
  <!-- CSS personalizado -->
  <link rel="stylesheet" th:href="@{/css/estilos.css}" />
</head>
<body>
  <main style="margin-top: 1.5rem; margin-bottom: 6rem;">

    <!-- 🧢 Encabezado -->
    <header class="site-header py-4">
      <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">

        <div class="logo">LOGO</div>

        <!-- 🔍 Buscador + Filtros -->
        <div class="d-flex align-items-center flex-wrap justify-content-center gap-2">
          <form th:action="@{/productos/buscar}" method="get" class="d-flex align-items-center flex-wrap gap-2 position-relative">
            <input class="form-control search-input" name="keyword" placeholder="Buscar productos" type="text" />
            <i class="fas fa-search search-icon"></i>

            <div class="dropdown">
              <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                🔎 Filtros
              </button>
              <div class="dropdown-menu p-4" style="min-width: 300px;">
                <div class="mb-3">
                  <label class="form-label">Condición</label>
                  <select name="estado" class="form-select">
                    <option value="">Todos</option>
                    <option value="nuevo">Nuevo</option>
                    <option value="usado">Usado</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Categoría</label>
                  <select name="categoria" class="form-select">
                    <option value="">Todas</option>
                    <option value="camisas">Camisas</option>
                    <option value="pantalones">Pantalones</option>
                    <option value="vestidos">Vestidos</option>
                    <option value="accesorios">Accesorios</option>
                    <option value="conjuntos">Conjuntos</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Precio</label>
                  <select name="precioRango" class="form-select">
                    <option value="">Todos</option>
                    <option value="menos10">Menos de ₡10,000</option>
                    <option value="entre10y20">₡10,000 a ₡20,000</option>
                    <option value="mas20">Más de ₡20,000</option>
                  </select>
                </div>
                <div class="text-end">
                  <button type="submit" class="btn btn-dark">Aplicar filtros</button>
                </div>
              </div>
            </div>
          </form>
        </div>

        <!-- 🧭 Botones de acción -->
        <div class="header-buttons d-flex gap-2">
          <button class="btn btn-outline-secondary btn-sm">Reportar problema</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/login'">Iniciar Sesión</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/registro'">Crear cuenta</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/carrito'">Ver carrito</button>
        </div>

      </div>
    </header>

    <!-- 📂 Menú -->
    <nav th:replace="fragments/menu :: menu"></nav>

    <!-- 📝 Título -->
    <div class="container mt-4 mb-3">
      <h1 class="text-center fw-bold">Contáctenos</h1>
      <hr />
    </div>

    <!-- 💬 Formulario dividido -->
    <section class="container mb-5">
      <div class="row g-0 text-white" style="background-color: #6f3ea6; border-radius: 8px; overflow: hidden;">

        <!-- Izquierda -->
        <div class="col-md-6 d-flex flex-column justify-content-center align-items-center p-4">
          <h2 class="text-center mb-3">REALIZA TU CONSULTA</h2>
          <div th:if="${mensaje}" class="alert alert-light text-center mt-2" style="background-color: rgba(255,255,255,0.15); border: none;">
            <p th:text="${mensaje}" class="fw-bold mb-0"></p>
          </div>
        </div>

        <!-- Separador -->
        <div class="col-md-1 d-none d-md-flex align-items-center justify-content-center">
          <div style="width: 2px; height: 80%; background-color: white;"></div>
        </div>

        <!-- Derecha -->
        <div class="col-md-5 p-4">
          <form th:action="@{/contacto}" th:object="${contacto}" method="post" class="d-grid gap-3">
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre" required />
            <input type="text" th:field="*{apellido}" class="form-control" placeholder="Apellido" required />
            <input type="email" th:field="*{correo}" class="form-control" placeholder="Correo electrónico" required />
            <input type="text" th:field="*{telefono}" class="form-control" placeholder="Teléfono" />
            <textarea th:field="*{mensaje}" class="form-control" rows="4" placeholder="Escribe aquí tu texto" required></textarea>

            <div class="d-flex justify-content-between pt-2">
              <button type="submit" class="btn btn-light fw-bold">ENVIAR</button>
              <a href="/" class="btn btn-outline-light fw-bold">VOLVER</a>
            </div>
          </form>
        </div>
      </div>
    </section>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
